name: ci

# Quality gates for every push to main and every pull request. Runs the same
# checks a contributor runs locally (scripts/quality_gates.sh) plus the site's
# unit tests and a build, so a broken shell script or a broken tour never lands.
on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gates:
    name: shell quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # quality_gates.sh shells out to jq, shellcheck, and dash/bash/zsh for the
      # multi-shell parse. ubuntu-latest ships jq, bash, and dash; add the rest.
      - name: Install tooling
        run: sudo apt-get update && sudo apt-get install -y shellcheck zsh

      - name: Run quality gates
        run: sh scripts/quality_gates.sh

  site:
    name: site (build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install deps
        working-directory: site
        run: bun install --frozen-lockfile

      - name: Unit tests
        working-directory: site
        run: bun test

      - name: Build
        working-directory: site
        run: bun run build
