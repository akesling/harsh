name: ci

# Quality gates for every push to main and every pull request. Runs the same
# checks a contributor runs locally (scripts/quality_gates.sh) plus the site's
# unit tests and a build, so a broken shell script or a broken tour never lands.
# The tests jobs re-run the hermetic suite with the harness under each shell we
# claim to support (HARSH_TEST_SH), on Linux and macOS — the portability claim
# is executed, not just parsed.
on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gates:
    name: shell quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # quality_gates.sh shells out to jq, shellcheck, and dash/bash/zsh/busybox
      # for the multi-shell parse. ubuntu-latest ships jq, bash, and dash; add
      # the rest.
      - name: Install tooling
        run: sudo apt-get update && sudo apt-get install -y shellcheck zsh busybox

      - name: Run quality gates
        run: sh scripts/quality_gates.sh

  tests:
    name: tests (${{ matrix.shell }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { shell: dash,         package: dash }
          - { shell: bash,         package: bash }
          - { shell: zsh,          package: zsh }
          - { shell: 'busybox sh', package: busybox }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install shell
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.package }}

      - name: Run test suite under ${{ matrix.shell }}
        run: HARSH_TEST_SH='${{ matrix.shell }}' sh tests/run.sh

  tests-macos:
    name: tests (macOS, BSD userland)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run test suite
        run: sh tests/run.sh

  site:
    name: site (build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install deps
        working-directory: site
        run: bun install --frozen-lockfile

      # Build first: app.ts imports src/generated.json (an ignored artifact that
      # build.ts produces), so the unit tests can't load without it.
      - name: Build
        working-directory: site
        run: bun run build

      - name: Unit tests
        working-directory: site
        run: bun test
