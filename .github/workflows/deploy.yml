name: deploy

# Publish the source tour (site/) to Cloudflare Pages on every update to main.
# Deploying with --branch=main marks this as the *production* deployment for the
# Pages project; PR builds deploy to other branch names and Cloudflare serves
# those as preview deployments automatically (see preview-deploy.yml).
on:
  push:
    branches: [main]

concurrency:
  group: cf-pages-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Scope the Cloudflare credentials + any protection rules to the "site"
    # deployment environment. Only deploy jobs run here; CI does not.
    environment: site
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Build site
        working-directory: site
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Deploy to Cloudflare Pages (production)
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.9.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # PROJECT_NAME is the Cloudflare Pages project; set it as a repo
          # variable (Settings → Secrets and variables → Actions → Variables).
          command: pages deploy site/dist --project-name=${{ vars.CF_PAGES_PROJECT }} --branch=main
