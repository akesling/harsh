name: preview-build

# Build a PR's source tour and stash it as an artifact. This runs with the PR's
# (untrusted) code, so it has NO secrets — it only produces an artifact. The
# privileged Cloudflare deploy happens in preview-deploy.yml, which runs trusted
# code from the default branch via workflow_run. This split is what lets fork
# PRs get a preview without exposing the Cloudflare token.
#
# Nothing in the artifact is trusted: the deploy workflow resolves the PR
# number server-side from the run's head SHA, because untrusted build code can
# write anything it likes into the artifact (even during later "trusted" steps
# — a background process started by `bun run build` outlives its step).
on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Build site
        working-directory: site
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Upload preview artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: preview-site
          path: site/dist
          retention-days: 3
