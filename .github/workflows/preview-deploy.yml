name: preview-deploy

# Deploy the artifact built by preview-build.yml to Cloudflare Pages as a
# preview deployment, then leave (or update) a sticky comment linking it. This
# is triggered by workflow_run, so it runs the trusted workflow definition from
# the default branch — safe to hold the Cloudflare token even for fork PRs.
on:
  workflow_run:
    workflows: [preview-build]
    types: [completed]

# One in-flight deploy per PR head, so an older build can never land after a
# newer one. (Keying on workflow_run.id would make every run its own group and
# dedupe nothing.)
concurrency:
  group: cf-pages-preview-${{ github.event.workflow_run.head_repository.full_name }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write   # post the preview comment
  actions: read          # download the artifact

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    # Same "site" deployment environment as production — both deploys need its
    # Cloudflare credentials. CI / preview-build do not run here.
    environment: site
    steps:
      - name: Download preview artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: preview-site
          path: dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      # Resolve the PR number server-side from the triggering run's head SHA —
      # never from the artifact. The artifact is produced while untrusted PR
      # code runs, so trusting any value inside it would let a malicious PR
      # claim another PR's number and hijack its stable preview alias and
      # sticky comment. Untrusted values reach this script only via env (no
      # ${{ }} interpolation into the script body) and reach the jq program
      # only via --arg, so a hostile branch name can't inject into either.
      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          HEAD_REPO: ${{ github.event.workflow_run.head_repository.full_name }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          n=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/pulls" \
              | jq -r --arg repo "${HEAD_REPO}" --arg branch "${HEAD_BRANCH}" \
                  '.[] | select(.head.repo.full_name == $repo and .head.ref == $branch) | .number' \
              | head -n1)
          case "$n" in
            ''|*[!0-9]*) echo "no open PR found for ${HEAD_SHA}" >&2; exit 1 ;;
          esac
          rm -f dist/.pr-number   # scrub any attacker-supplied stray file
          echo "number=$n" >> "$GITHUB_OUTPUT"

      # Deploy under a deterministic branch name so the preview gets the stable
      # alias https://pr-<N>.<project>.pages.dev. wrangler-action exposes both
      # the per-build `deployment-url` and the stable `pages-deployment-alias-url`.
      - name: Deploy to Cloudflare Pages (preview)
        id: cf
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.9.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CF_PAGES_PROJECT }} --branch=pr-${{ steps.pr.outputs.number }}

      - name: Comment the preview URL
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          number: ${{ steps.pr.outputs.number }}
          header: preview
          message: |
            📖 **Source-tour preview** for this PR:
            ${{ steps.cf.outputs.pages-deployment-alias-url }}

            This build: ${{ steps.cf.outputs.deployment-url }}
            Built from ${{ github.event.workflow_run.head_sha }} · redeploys on every push.
