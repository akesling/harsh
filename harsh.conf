# harsh.conf — configuration for the harsh agent harness.
# This file is sourced by harsh.sh as POSIX shell. Keep it to KEY=value lines.
# Values here override built-in defaults. Comment a line out to use the default.

# --- provider / model / API ------------------------------------------------
# Which API to speak:
#   anthropic — Claude Messages API     (key: ANTHROPIC_API_KEY)   [default]
#   openai    — OpenAI Chat Completions (key: OPENAI_API_KEY)
# Model, endpoint, and key-env all default per provider. Leave commented to take
# the default (anthropic) and switch per run via the environment
# (HARSH_PROVIDER=openai ./harsh.sh); uncomment to pin a provider here.
# HARSH_PROVIDER=openai

# Model and endpoint default from the provider (anthropic→claude-opus-4-8,
# openai→gpt-4o). Leave these commented to take the provider default; uncomment
# to pin a specific model/endpoint. Do NOT hardcode a Claude model here if you
# switch HARSH_PROVIDER=openai — leave it commented or set an OpenAI model.
# HARSH_MODEL=claude-opus-4-8
# HARSH_API_URL=https://api.anthropic.com/v1/messages
HARSH_MAX_TOKENS=8192
HARSH_API_VERSION=2023-06-01   # anthropic-only header; ignored for openai

# Transient API failures (network errors, 408/429/5xx) retry with exponential
# backoff: HARSH_RETRIES attempts, first wait HARSH_RETRY_DELAY seconds.
# HARSH_RETRIES=3
# HARSH_RETRY_DELAY=2

# Prompt caching: insert cache_control breakpoints so the stable prefix
# (tool schemas + system prompt) and the conversation-so-far bill at the
# cache-read rate (~0.1x) on later turns instead of full price every call —
# a large saving in tool-using/agentic loops. On by default; uncomment and set
# 0 to disable here, or pass HARSH_CACHE=0 in the environment for one run.
# Inspect what a turn spends with `harsh.sh usage SESSION`.
# HARSH_CACHE=0

# The API key is read from the environment so it never has to live in this file:
# HARSH_API_KEY, else ANTHROPIC_API_KEY (anthropic) / OPENAI_API_KEY (openai).
# You *may* set it here if you must:
# HARSH_API_KEY=sk-...

# --- directories -----------------------------------------------------------
# Directories are stated explicitly — harsh infers nothing. $SELF_DIR is
# exported by harsh.sh and expands to the directory holding harsh.sh, so these
# defaults sit next to the script regardless of your current directory. Change
# any of them to an absolute or $PWD-relative path to relocate that directory
# (e.g. keep sessions/logs with a specific project).
HARSH_TOOLS_DIR="$SELF_DIR/tools"
HARSH_SKILLS_DIR="$SELF_DIR/skills"
HARSH_SESSIONS_DIR="$SELF_DIR/sessions"
HARSH_LOG_DIR="$SELF_DIR/logs"
# Hooks are optional: if this directory is absent, hooks are simply disabled.
# Layout: hooks/<Event>/*.sh (and hooks/PreToolUse/<tool>/*.sh to scope to one
# tool). See hooks/README.md.
HARSH_HOOKS_DIR="$SELF_DIR/hooks"

# --- tool permissions (hooks/PreToolUse/10-permissions.sh) -----------------
# The permission gate is dormant until you opt in. Set a mode to enable it:
#   allow — run everything (gate effectively off)
#   ask   — prompt on the terminal for anything not explicitly allowed
#   deny  — refuse anything not explicitly allowed
# Or leave this unset and drop a permissions.json (project .harsh/, user
# ~/.config/harsh/, or per-session) to enable + configure it. Manage with
# `harsh.sh permissions SESSION`.
# HARSH_PERMISSIONS_MODE=ask
# Opt-in sandbox rewriter (hooks/PreToolUse/20-sandbox.sh): wrap bash commands
# in sandbox-exec/bwrap for confined execution.
# HARSH_SANDBOX=1
# Extensible CLI commands (drop-in NAME.sh scripts; see commands/README.md).
HARSH_COMMANDS_DIR="$SELF_DIR/commands"

# --- agent loop ------------------------------------------------------------
HARSH_MAX_TURNS=127
# Auto-compaction: when the conversation's context passes this many tokens,
# the loop summarizes it (the full history stays in the session log)
# and continues from the summary. Set 0 to disable.
# HARSH_COMPACT_AT=150000
# Stream replies token-by-token as they arrive (anthropic only). The final
# transcript still renders normally; streaming only affects the live view.
# HARSH_STREAM=1
HARSH_SYSTEM_PROMPT="You are a concise and capable assistant operating inside harsh, a coding agent harness. Prefer small, verifiable steps. When the task is complete, stop and summarize."

# --- testing ---------------------------------------------------------------
# Set to 1 to run an offline mock model instead of calling the API. Useful for
# smoke-testing the loop and tools without a key or network. A user message
# containing a [[tool:NAME:ARG]] marker makes the mock emit that tool call.
# HARSH_MOCK=1
